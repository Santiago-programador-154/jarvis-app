<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - CHAT</title>
    <link rel="stylesheet" href="style.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="header-status">
        <h2>JARVIS OS</h2>
        <div class="status-online">● híbrido ativo</div>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="balao jarvis-msg">
            <span class="sender-name">JARVIS</span>
            Sistema online, senhor. Como posso ajudar hoje?
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <button class="btn-icon" id="attachBtn" onclick="dispararUpload()">📎</button>
            <input type="file" id="fileInput" accept="application/pdf,image/*" style="display: none;" onchange="arquivoSelecionado()">
            
            <input type="text" id="userInput" placeholder="Mensagem" autocomplete="off">
        </div>
        
        <button class="btn-round" id="micBtn" onclick="alternarVoz()">🎙️</button>
        
        <button class="btn-round" id="sendBtn" onclick="enviarMensagem()">➤</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
